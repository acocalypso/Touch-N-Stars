name: Build Bundle & Publish Production Release

on:
  workflow_dispatch: {}

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build:native

      - name: Package dist assets
        run: |
          cd dist
          zip -r ../dist.zip .

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build stable tag
        id: stable
        run: |
          TAG="${{ steps.pkg.outputs.version }}-stable"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse "${{ steps.stable.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.stable.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "${{ steps.stable.outputs.tag }}" -m "Release ${{ steps.stable.outputs.tag }}"
          git push origin "${{ steps.stable.outputs.tag }}"

      - name: Upload dist.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stable.outputs.tag }}
          name: ${{ steps.stable.outputs.tag }}
          prerelease: false
          make_latest: true
          files: |
            dist.zip
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
