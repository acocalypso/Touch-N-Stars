name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gemini-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Run Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const diff = fs.readFileSync('pr.diff', 'utf8').slice(0, 180000);
          const contextPath = '.github/gemini-context.md';
          const stylePath = '.gemini/styleguide.md';
          const entryPath = 'GEMINI.md';

          const projectContext = fs.existsSync(contextPath)
            ? fs.readFileSync(contextPath, 'utf8').slice(0, 40000)
            : 'No additional project context file found.';
          const styleGuide = fs.existsSync(stylePath)
            ? fs.readFileSync(stylePath, 'utf8').slice(0, 60000)
            : 'No style guide found.';
          const geminiEntry = fs.existsSync(entryPath)
            ? fs.readFileSync(entryPath, 'utf8').slice(0, 8000)
            : 'No GEMINI.md entry found.';
          const body = {
            contents: [{
              parts: [{
                text: [
                  'Review this PR diff as a strict senior frontend engineer.',
                  'Use the project context and style guide below as authoritative guidance for domain behavior and risk assessment.',
                  'Focus on correctness, regressions, security, test gaps, i18n quality, and CI robustness.',
                  'Do not repeat style-only findings that are already covered by CI style gates unless they cause functional risk.',
                  'Return concise and actionable findings grouped by severity.',
                  '',
                  'GEMINI ENTRY:',
                  geminiEntry,
                  '',
                  'PROJECT CONTEXT:',
                  projectContext,
                  '',
                  'STYLE GUIDE:',
                  styleGuide,
                  '',
                  'DIFF:',
                  diff,
                ].join('\n')
              }]
            }]
          };

          async function main() {
            const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=' + process.env.GEMINI_API_KEY;
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error('Gemini API error: ' + text);
            }

            const data = await response.json();
            const review = data?.candidates?.[0]?.content?.parts?.map((p) => p.text).join('\n') || 'Gemini returned no review text.';
            fs.writeFileSync('gemini-review.md', review);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('gemini-review.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Gemini Automated Review\n\n' + body,
            });
