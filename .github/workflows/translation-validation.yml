name: Translation Validation

on:
  pull_request:
    branches: [master, develop]
    paths:
      - src/locales/**
      - scripts/**
      - package.json
      - package-lock.json
      - .github/workflows/translation-validation.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: translation-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate locale files
        run: npm run i18n:check
